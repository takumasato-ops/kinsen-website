<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 株式会社琴線</title>
  <meta name="description" content="株式会社琴線へのお問い合わせページです。人材紹介・RPO・イベント等、お気軽にご相談ください。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <header class="nav-header scrolled" id="navHeader">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">琴線</a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link">Top</a>
        <a href="index.html#services" class="nav-link">Service</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="index.html#news" class="nav-link">News</a>
        <a href="contact.html" class="nav-link nav-link-cta active">Contact</a>
      </nav>
      <button class="nav-hamburger" id="navHamburger" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <span class="section-label">Contact</span>
      <h1 class="section-heading">お問い合わせ</h1>
    </div>
  </div>

  <!-- Contact Form -->
  <section class="section">
    <div class="container" style="max-width: 700px;">
      <p style="text-align: center; color: var(--text-soft); font-size: 15px; line-height: 1.8; margin-bottom: 48px;">
        人材紹介・RPO・イベント、どの領域からでも構いません。<br>
        下記フォームよりお気軽にお問い合わせください。
      </p>

      <form id="contactForm">
        <div class="form-group">
          <label class="form-label" for="name">お名前<span class="required">必須</span></label>
          <input class="form-input" type="text" id="name" name="name" placeholder="山田 太郎" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="company">会社名</label>
          <input class="form-input" type="text" id="company" name="company" placeholder="株式会社〇〇">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">メールアドレス<span class="required">必須</span></label>
          <input class="form-input" type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">電話番号</label>
          <input class="form-input" type="tel" id="phone" name="phone" placeholder="090-0000-0000">
        </div>

        <div class="form-group">
          <label class="form-label" for="category">お問い合わせ種別<span class="required">必須</span></label>
          <select class="form-select" id="category" name="category" required>
            <option value="" disabled selected>選択してください</option>
            <option value="人材紹介について">人材紹介について</option>
            <option value="RPO（採用代行）について">RPO（採用代行）について</option>
            <option value="イベントについて">イベントについて</option>
            <option value="採用・求人について">採用・求人について</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="message">お問い合わせ内容<span class="required">必須</span></label>
          <textarea class="form-textarea" id="message" name="message" placeholder="お問い合わせ内容をご記入ください" required></textarea>
        </div>

        <div style="text-align: center; margin-top: 40px;">
          <button type="submit" class="btn-dark btn-large">
            <span>送信する</span>
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 9h10M10 5l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </form>

      <div style="margin-top: 64px; padding-top: 48px; border-top: 1px solid var(--border); text-align: center;">
        <p style="font-size: 14px; color: var(--text-lighter); margin-bottom: 16px;">お電話でのお問い合わせ</p>
        <p style="font-size: 24px; font-family: var(--font-en); font-weight: 600; letter-spacing: 0.05em;">0857-77-3321</p>
        <p style="font-size: 13px; color: var(--text-lighter); margin-top: 8px;">受付時間：平日 9:00〜18:00</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <div class="footer-brand">
          <div class="footer-logo">琴線</div>
          <p>琴線に触れる瞬間を、すべての人へ。</p>
        </div>
        <div class="footer-links">
          <div class="footer-col">
            <h4>Service</h4>
            <a href="index.html#services">人材紹介</a>
            <a href="index.html#services">RPO</a>
            <a href="index.html#services">イベント</a>
          </div>
          <div class="footer-col">
            <h4>Company</h4>
            <a href="about.html">会社概要</a>
            <a href="about.html#message">代表メッセージ</a>
            <a href="contact.html">お問い合わせ</a>
          </div>
          <div class="footer-col">
            <h4>SNS</h4>
            <a href="https://www.instagram.com/kinsen_official.jp/" target="_blank" rel="noopener">Instagram</a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2025 株式会社琴線 All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
